apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-k8s
  namespace: homelab-test
spec:
  dnsNames:
    - test.k8s.nairdev.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    rotationPolicy: Always
  secretName: test-k8s-tls
