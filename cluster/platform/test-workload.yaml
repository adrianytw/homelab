apiVersion: v1
kind: Namespace
metadata:
  name: homelab-test
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-k8s
  namespace: homelab-test
spec:
  dnsNames:
    - test.k8s.nairdev.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    rotationPolicy: Always
  secretName: test-k8s-tls
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-data
  namespace: homelab-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 16Mi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: homelab-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: busybox@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          command:
            - sh
            - -c
            - test -f /data/index.html || printf 'homelab test workload\n' >/data/index.html; exec httpd -f -p 8080 -h /data
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: web-data
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: homelab-test
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: homelab-test
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - test.k8s.nairdev.com
      secretName: test-k8s-tls
  rules:
    - host: test.k8s.nairdev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
