---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-nairdev
  namespace: core
spec:
  dnsNames:
    - home.nairdev.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    rotationPolicy: Always
  secretName: home-nairdev-tls
