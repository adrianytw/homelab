apiVersion: v1
kind: Namespace
metadata:
  name: core
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glance
  namespace: core
data:
  glance.yml: |
    server:
      proxied: true
      assets-path: /app/assets
    branding:
      app-name: Homelab
      logo-text: H
      hide-footer: true
    theme:
      background-color: 205 13 18
      primary-color: 172 31 62
      positive-color: 83 34 63
      negative-color: 359 68 70
      contrast-multiplier: 1.2
    pages:
      - name: Home
        width: slim
        head-widgets:
          - type: search
            search-engine: google
        columns:
          - size: full
            widgets:
              - type: monitor
                title: Services
                style: compact
                cache: 1m
                sites:
                  - title: Glance
                    url: https://home.nairdev.com
                  - title: Uptime Kuma
                    url: https://status.nairdev.com
                  - title: ntfy
                    url: https://notify.nairdev.com
                    check-url: https://notify.nairdev.com/v1/health
                  - title: Healthchecks
                    url: https://health.ops.nairdev.com
                  - title: Prometheus
                    url: https://prom.ops.nairdev.com
                    check-url: https://prom.ops.nairdev.com/-/ready
                  - title: Grafana
                    url: https://grafana.nairdev.com
                    check-url: https://grafana.nairdev.com/api/health
                  - title: Home Assistant
                    url: http://192.168.88.84:8123
                  - title: Router
                    url: https://router.nairdev.com
                  - title: AdGuard
                    url: https://adguard.nairdev.com
          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Operations
                    links:
                      - title: Uptime Kuma
                        url: https://status.nairdev.com
                      - title: ntfy
                        url: https://notify.nairdev.com
                      - title: Healthchecks
                        url: https://health.ops.nairdev.com
                      - title: Prometheus
                        url: https://prom.ops.nairdev.com
                      - title: Grafana
                        url: https://grafana.nairdev.com
                  - title: Infrastructure
                    links:
                      - title: Home Assistant
                        url: http://192.168.88.84:8123
                      - title: Router
                        url: https://router.nairdev.com
                      - title: AdGuard
                        url: https://adguard.nairdev.com
                  - title: Source/Test
                    links:
                      - title: GitHub
                        url: https://github.com/adrianytw/homelab
                      - title: Test workload
                        url: https://test.k8s.nairdev.com
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glance-assets
  namespace: core
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: glance
          image: docker.io/glanceapp/glance@sha256:ab7ddd51269063b7ec5031e888cccf0f8381fba3245ff5e94f1deb155ca0775d
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: assets
              mountPath: /app/assets
      volumes:
        - name: config
          configMap:
            name: glance
        - name: assets
          persistentVolumeClaim:
            claimName: glance-assets
---
apiVersion: v1
kind: Service
metadata:
  name: glance
  namespace: core
spec:
  selector:
    app: glance
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glance
  namespace: core
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - home.nairdev.com
      secretName: home-nairdev-tls
  rules:
    - host: home.nairdev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glance
                port:
                  name: http
