apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: core
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: core
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: uptime-kuma
          image: docker.io/louislam/uptime-kuma@sha256:775df4fa787d0e77bdbd27c801a154ac578340fa8f70b14f039a1dfc5f3bbfda
          env:
            - name: UPTIME_KUMA_DB_TYPE
              value: sqlite
            - name: UPTIME_KUMA_SQLITE_SINGLE_CONNECTION
              value: "true"
          ports:
            - name: http
              containerPort: 3001
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: core
spec:
  selector:
    app: uptime-kuma
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: core
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - status.nairdev.com
      secretName: status-nairdev-tls
  rules:
    - host: status.nairdev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-kuma
                port:
                  name: http
---
apiVersion: v1
kind: ConfigMap
metadata: {name: uptime-kuma-monitor-setup, namespace: core}
data:
  configure.js: |
    const wanted = [
      {name: "Glance", url: "https://home.nairdev.com"},
      {name: "Uptime Kuma", url: "https://status.nairdev.com"},
      {name: "ntfy", url: "https://notify.nairdev.com/v1/health"},
      {name: "Healthchecks", url: "https://health.ops.nairdev.com"},
      {name: "Prometheus", url: "https://prom.ops.nairdev.com/-/ready"},
      {name: "Grafana", url: "https://grafana.nairdev.com/api/health"},
      {name: "Home Assistant", url: "http://192.168.88.84:8123"},
      {name: "Router", url: "https://router.nairdev.com", ignoreTls: true},
      {name: "AdGuard", url: "https://adguard.nairdev.com", ignoreTls: true},
      {name: "Test workload", url: "https://test.k8s.nairdev.com"},
      {
        name: "AdGuard DNS", type: "dns", hostname: "example.com", port: 53,
        dns_resolve_type: "A", dns_resolve_server: "192.168.88.1"
      }
    ];
    const common = {
      type: "http", method: "GET", interval: 60,
      retryInterval: 30, maxretries: 2, resendInterval: 0,
      accepted_statuscodes: ["200-399"], ignoreTls: false,
      expiryNotification: true, domainExpiryNotification: false,
      maxredirects: 10, kafkaProducerBrokers: [],
      kafkaProducerSaslOptions: {}, rabbitmqNodes: [], conditions: []
    };
    const desired = (monitor) => ({...common, ...monitor});
    const payload = (monitor, current = {}) => ({
      ...current, ...desired(monitor),
      notificationIDList: current.notificationIDList ?? {}
    });
    const changed = (current, monitor) => Object.entries(desired(monitor))
      .some(([key, value]) => JSON.stringify(current[key]) !== JSON.stringify(value));
    if (process.env.CHECK_ONLY) {
      const notifications = {"1": true};
      const current = {id: 7, name: "Glance", url: "old", notificationIDList: notifications};
      const next = payload(wanted[0], current);
      if (!changed(current, wanted[0]) || changed(next, wanted[0]) ||
          next.id !== 7 || next.notificationIDList !== notifications) process.exit(1);
      console.log("uptime kuma reconciliation check ok");
      process.exit(0);
    }
    const { io } = require("socket.io-client");
    const socket = io(process.env.KUMA_URL, { transports: ["websocket"] });
    const emit = (event, ...args) => new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error(`${event} timed out`)), 30000);
      socket.emit(event, ...args, (result) => {
        clearTimeout(timer);
        result?.ok ? resolve(result) : reject(new Error(result?.msg || `${event} failed`));
      });
    });
    (async () => {
      await new Promise((resolve, reject) => {
        socket.once("connect", resolve);
        socket.once("connect_error", reject);
      });
      await emit("login", {username: process.env.KUMA_USERNAME, password: process.env.KUMA_PASSWORD});
      const listPromise = new Promise((resolve) => socket.once("monitorList", resolve));
      await emit("getMonitorList");
      const existing = Object.values(await listPromise);
      for (const monitor of wanted) {
        const current = existing.find((item) => item.name === monitor.name);
        if (!current) await emit("add", payload(monitor));
        else if (changed(current, monitor)) await emit("editMonitor", payload(monitor, current));
        else continue;
        console.log(`reconciled ${monitor.name}`);
      }
      socket.close();
    })().catch((error) => { console.error(error.message); socket.close(); process.exit(1); });
---
apiVersion: batch/v1
kind: CronJob
metadata: {name: uptime-kuma-monitor-setup, namespace: core}
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 4
      activeDeadlineSeconds: 300
      template:
        metadata: {labels: {app: uptime-kuma-monitor-setup}}
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext: {seccompProfile: {type: RuntimeDefault}}
          containers:
            - name: configure
              image: docker.io/louislam/uptime-kuma@sha256:775df4fa787d0e77bdbd27c801a154ac578340fa8f70b14f039a1dfc5f3bbfda
              command: [node, /config/configure.js]
              env:
                - {name: NODE_PATH, value: /app/node_modules}
                - {name: KUMA_URL, value: "http://uptime-kuma.core.svc.cluster.local"}
                - name: KUMA_USERNAME
                  valueFrom: {secretKeyRef: {name: uptime-kuma-admin, key: username}}
                - name: KUMA_PASSWORD
                  valueFrom: {secretKeyRef: {name: uptime-kuma-admin, key: password}}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: {drop: [ALL]}
                runAsNonRoot: true
                runAsUser: 1000
              volumeMounts: [{name: config, mountPath: /config, readOnly: true}]
          volumes: [{name: config, configMap: {name: uptime-kuma-monitor-setup}}]
