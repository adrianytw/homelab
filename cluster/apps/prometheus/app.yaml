apiVersion: v1
kind: ConfigMap
metadata: {name: prometheus, namespace: core}
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    rule_files:
      - /etc/prometheus/rules/*.yaml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: [alertmanager.core.svc.cluster.local:9093]
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]
      - job_name: nmac
        static_configs:
          - targets: [node-exporter.core.svc.cluster.local:9100]
      - job_name: alertmanager
        static_configs:
          - targets: [alertmanager.core.svc.cluster.local:9093]
  alerts.yaml: |
    groups:
      - name: homelab
        rules:
          - alert: MonitoringTargetDown
            expr: up == 0
            for: 2m
            labels: {severity: critical}
            annotations: {summary: "{{ $labels.job }} monitoring target is down"}
          - alert: NmacDiskSpaceLow
            expr: node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} < 0.15
            for: 10m
            labels: {severity: warning}
            annotations: {summary: nmac root filesystem has less than 15% free space}
          - alert: NmacMemoryLow
            expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
            for: 10m
            labels: {severity: warning}
            annotations: {summary: nmac has less than 10% available memory}
          - alert: NmacCpuHigh
            expr: 100 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100 > 90
            for: 15m
            labels: {severity: warning}
            annotations: {summary: nmac CPU usage has exceeded 90% for 15 minutes}
---
apiVersion: apps/v1
kind: DaemonSet
metadata: {name: node-exporter, namespace: core}
spec:
  selector: {matchLabels: {app: node-exporter}}
  template:
    metadata: {labels: {app: node-exporter}}
    spec:
      automountServiceAccountToken: false
      securityContext: {seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: node-exporter
          image: docker.io/prom/node-exporter@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/kubelet/pods/.+|var/lib/containers/storage/.+)($|/)
          ports: [{name: metrics, containerPort: 9100}]
          readinessProbe: {httpGet: {path: /metrics, port: metrics}}
          livenessProbe: {httpGet: {path: /metrics, port: metrics}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - {name: proc, mountPath: /host/proc, readOnly: true}
            - {name: sys, mountPath: /host/sys, readOnly: true}
            - {name: root, mountPath: /host/root, readOnly: true, mountPropagation: HostToContainer}
      volumes:
        - {name: proc, hostPath: {path: /proc}}
        - {name: sys, hostPath: {path: /sys}}
        - {name: root, hostPath: {path: /}}
---
apiVersion: v1
kind: Service
metadata: {name: node-exporter, namespace: core}
spec:
  selector: {app: node-exporter}
  ports: [{name: metrics, port: 9100, targetPort: metrics}]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: prometheus-data, namespace: core}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 10Gi}}
  storageClassName: local-path
---
apiVersion: v1
kind: ConfigMap
metadata: {name: alertmanager, namespace: core}
data:
  alertmanager.yml: |
    route:
      receiver: discard
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 30s
      repeat_interval: 4h
      routes:
        - receiver: ntfy
          matchers: [severity=~"warning|critical"]
    receivers:
      - name: discard
      - name: ntfy
        webhook_configs:
          - url: http://ntfy-alertmanager.core.svc.cluster.local:8000/hook
            send_resolved: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: alertmanager-data, namespace: core}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 1Gi}}
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: alertmanager, namespace: core}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: alertmanager}}
  template:
    metadata:
      labels: {app: alertmanager}
      annotations: {homelab.nairdev.com/config-revision: "2"}
    spec:
      automountServiceAccountToken: false
      securityContext: {fsGroup: 65534, fsGroupChangePolicy: OnRootMismatch, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: alertmanager
          image: quay.io/prometheus/alertmanager@sha256:51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
          args: [--config.file=/etc/alertmanager/alertmanager.yml, --storage.path=/alertmanager]
          ports: [{name: http, containerPort: 9093}]
          startupProbe: {httpGet: {path: /-/ready, port: http}, failureThreshold: 30, periodSeconds: 5}
          readinessProbe: {httpGet: {path: /-/ready, port: http}}
          livenessProbe: {httpGet: {path: /-/healthy, port: http}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - {name: config, mountPath: /etc/alertmanager, readOnly: true}
            - {name: data, mountPath: /alertmanager}
      volumes:
        - {name: config, configMap: {name: alertmanager}}
        - {name: data, persistentVolumeClaim: {claimName: alertmanager-data}}
---
apiVersion: v1
kind: Service
metadata: {name: alertmanager, namespace: core}
spec:
  selector: {app: alertmanager}
  ports: [{name: http, port: 9093, targetPort: http}]
---
apiVersion: v1
kind: ConfigMap
metadata: {name: ntfy-alertmanager, namespace: core}
data:
  config.yml: |
    http:
      addr: :8000
    ntfy:
      baseurl: https://notify.nairdev.com
      notification:
        topic: homelab-alerts
        priority: 'status == "firing" ? "high" : "default"'
        tags:
          - {tag: rotating_light, condition: 'status == "firing"'}
          - {tag: white_check_mark, condition: 'status == "resolved"'}
        templates:
          title: '{{ if eq .Status "resolved" }}Resolved: {{ end }}{{ index .Annotations "summary" }}'
          description: '{{ index .Labels "severity" }} · {{ index .Labels "alertname" }}'
      async: false
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: ntfy-alertmanager, namespace: core}
spec:
  replicas: 1
  selector: {matchLabels: {app: ntfy-alertmanager}}
  template:
    metadata:
      labels: {app: ntfy-alertmanager}
      annotations: {homelab.nairdev.com/config-revision: "3"}
    spec:
      automountServiceAccountToken: false
      securityContext: {fsGroup: 65534, fsGroupChangePolicy: OnRootMismatch, seccompProfile: {type: RuntimeDefault}}
      initContainers:
        - name: auth-config
          image: docker.io/library/busybox@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          command: [/bin/sh, -ceu]
          args:
            - |
              umask 077
              username=$(cat /secret/username); password=$(cat /secret/password)
              if printf %s "$username$password" | grep -q '[[:cntrl:]]'; then echo 'credential contains CR/LF' >&2; exit 1; fi
              username=$(printf %s "$username" | sed "s/'/''/g")
              password=$(printf %s "$password" | sed "s/'/''/g")
              printf "ntfy:\n  auth:\n    basic:\n      username: '%s'\n      password: '%s'\n" "$username" "$password" > /runtime/auth.yml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - {name: config, mountPath: /config, readOnly: true}
            - {name: secret, mountPath: /secret, readOnly: true}
            - {name: runtime, mountPath: /runtime}
      containers:
        - name: ntfy-alertmanager
          image: ghcr.io/alexbakker/alertmanager-ntfy@sha256:2a862f23c8fb67f777824979487c06a417b2f9bbbc2eb45a974a1fb45b9bbff3
          args:
            - --configs=/config/config.yml,/runtime/auth.yml
            - --ntfy-baseurl=http://$(NTFY_SERVICE_HOST):$(NTFY_SERVICE_PORT)
          ports: [{name: http, containerPort: 8000}]
          startupProbe: {httpGet: {path: /health, port: http}, failureThreshold: 30, periodSeconds: 5}
          readinessProbe: {httpGet: {path: /health, port: http}}
          livenessProbe: {httpGet: {path: /health, port: http}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - {name: config, mountPath: /config, readOnly: true}
            - {name: runtime, mountPath: /runtime, readOnly: true}
      volumes:
        - {name: config, configMap: {name: ntfy-alertmanager}}
        - {name: secret, secret: {secretName: ntfy-admin}}
        - {name: runtime, emptyDir: {medium: Memory}}
---
apiVersion: v1
kind: Service
metadata: {name: ntfy-alertmanager, namespace: core}
spec:
  selector: {app: ntfy-alertmanager}
  ports: [{name: http, port: 8000, targetPort: http}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: prometheus, namespace: core}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: prometheus}}
  template:
    metadata:
      labels: {app: prometheus}
      annotations: {homelab.nairdev.com/config-revision: "5"}
    spec:
      automountServiceAccountToken: false
      securityContext: {fsGroup: 65532, fsGroupChangePolicy: OnRootMismatch, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: prometheus
          image: docker.io/prom/prometheus@sha256:be7b6aa8ab8e2939a498312207f9efd9e0a838399bb46596970c9d72f763fb75
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.retention.size=5GB
          ports: [{name: http, containerPort: 9090}]
          startupProbe: {httpGet: {path: /-/ready, port: http}, failureThreshold: 30, periodSeconds: 5}
          readinessProbe: {httpGet: {path: /-/ready, port: http}}
          livenessProbe: {httpGet: {path: /-/healthy, port: http}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus, readOnly: true}
            - {name: rules, mountPath: /etc/prometheus/rules, readOnly: true}
            - {name: data, mountPath: /prometheus}
      volumes:
        - name: config
          configMap:
            name: prometheus
            items: [{key: prometheus.yml, path: prometheus.yml}]
        - name: rules
          configMap:
            name: prometheus
            items: [{key: alerts.yaml, path: alerts.yaml}]
        - name: data
          persistentVolumeClaim: {claimName: prometheus-data}
---
apiVersion: v1
kind: Service
metadata: {name: prometheus, namespace: core}
spec:
  selector: {app: prometheus}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: prometheus, namespace: core}
spec:
  ingressClassName: traefik
  tls:
    - hosts: [prom.ops.nairdev.com]
      secretName: prom-ops-nairdev-tls
  rules:
    - host: prom.ops.nairdev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: prometheus, port: {name: http}}}
