apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-datasources, namespace: core}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.core.svc.cluster.local
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-dashboards, namespace: core}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: Homelab
        folder: Homelab
        type: file
        disableDeletion: true
        allowUiUpdates: false
        options: {path: /var/lib/grafana-dashboards}
  nmac.json: |
    {"annotations":{"list":[]},"editable":false,"panels":[
      {"type":"stat","title":"Targets up","gridPos":{"h":8,"w":6,"x":0,"y":0},"datasource":"Prometheus","targets":[{"expr":"sum(up)","refId":"A"}]},
      {"type":"gauge","title":"CPU used","gridPos":{"h":8,"w":6,"x":6,"y":0},"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100}},"datasource":"Prometheus","targets":[{"expr":"100 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100","refId":"A"}]},
      {"type":"gauge","title":"Memory used","gridPos":{"h":8,"w":6,"x":12,"y":0},"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100}},"datasource":"Prometheus","targets":[{"expr":"(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100","refId":"A"}]},
      {"type":"gauge","title":"Root disk used","gridPos":{"h":8,"w":6,"x":18,"y":0},"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100}},"datasource":"Prometheus","targets":[{"expr":"(1 - node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"}) * 100","refId":"A"}]},
      {"type":"timeseries","title":"CPU usage","gridPos":{"h":9,"w":12,"x":0,"y":8},"fieldConfig":{"defaults":{"unit":"percent"}},"datasource":"Prometheus","targets":[{"expr":"100 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100","refId":"A"}]},
      {"type":"timeseries","title":"Available memory","gridPos":{"h":9,"w":12,"x":12,"y":8},"fieldConfig":{"defaults":{"unit":"bytes"}},"datasource":"Prometheus","targets":[{"expr":"node_memory_MemAvailable_bytes","refId":"A"}]}
    ],"refresh":"30s","schemaVersion":41,"tags":["homelab"],"templating":{"list":[]},"time":{"from":"now-6h","to":"now"},"title":"nmac overview","uid":"nmac-overview","version":1}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: grafana-data, namespace: core}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 5Gi}}
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: grafana, namespace: core}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: grafana}}
  template:
    metadata:
      labels: {app: grafana}
      annotations: {homelab.nairdev.com/config-revision: "2"}
    spec:
      automountServiceAccountToken: false
      securityContext: {fsGroup: 472, fsGroupChangePolicy: OnRootMismatch, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: grafana
          image: docker.io/grafana/grafana@sha256:38f965141ed8cae9ee6fcafbc4f7ee8112439fd55eaf37fecf6d8237f87c6b85
          env:
            - {name: GF_SERVER_ROOT_URL, value: "https://grafana.nairdev.com"}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "false"}
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: {secretKeyRef: {name: grafana-admin, key: username}}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: grafana-admin, key: password}}
          ports: [{name: http, containerPort: 3000}]
          startupProbe: {httpGet: {path: /api/health, port: http}, failureThreshold: 30, periodSeconds: 10}
          readinessProbe: {httpGet: {path: /api/health, port: http}}
          livenessProbe: {httpGet: {path: /api/health, port: http}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            runAsNonRoot: true
            runAsUser: 472
          volumeMounts:
            - {name: data, mountPath: /var/lib/grafana}
            - {name: datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true}
            - {name: dashboard-providers, mountPath: /etc/grafana/provisioning/dashboards, readOnly: true}
            - {name: dashboards, mountPath: /var/lib/grafana-dashboards, readOnly: true}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: grafana-data}
        - name: datasources
          configMap: {name: grafana-datasources}
        - name: dashboard-providers
          configMap:
            name: grafana-dashboards
            items: [{key: dashboards.yaml, path: dashboards.yaml}]
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items: [{key: nmac.json, path: nmac.json}]
---
apiVersion: v1
kind: Service
metadata: {name: grafana, namespace: core}
spec:
  selector: {app: grafana}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: grafana, namespace: core}
spec:
  ingressClassName: traefik
  tls:
    - hosts: [grafana.nairdev.com]
      secretName: grafana-nairdev-tls
  rules:
    - host: grafana.nairdev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: grafana, port: {name: http}}}
