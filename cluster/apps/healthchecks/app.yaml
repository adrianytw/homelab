apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: healthchecks-data, namespace: core}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 2Gi}}
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: healthchecks, namespace: core}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: healthchecks}}
  template:
    metadata:
      labels: {app: healthchecks}
      annotations: {homelab.nairdev.com/credentials-revision: "1"}
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
      initContainers:
        - name: bootstrap
          image: docker.io/healthchecks/healthchecks@sha256:7cdc4e61a775c82d886703c953bfdccbca9db3ab39f6c4583d39662f3947e1a9
          command: [/bin/sh, -ec]
          args:
            - |
              /opt/healthchecks/manage.py migrate --noinput
              /opt/healthchecks/manage.py shell < /bootstrap/bootstrap.py
          env:
            - {name: SITE_ROOT, value: "https://health.ops.nairdev.com"}
            - {name: ALLOWED_HOSTS, value: "health.ops.nairdev.com"}
            - {name: DB_NAME, value: "/data/hc.sqlite"}
            - {name: DEBUG, value: "False"}
            - name: SECRET_KEY
              valueFrom: {secretKeyRef: {name: healthchecks-admin, key: secret-key}}
            - name: HC_ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: healthchecks-admin, key: username}}
            - name: HC_ADMIN_EMAIL
              valueFrom: {secretKeyRef: {name: healthchecks-admin, key: email}}
            - name: HC_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: healthchecks-admin, key: password}}
            - name: HC_PING_KEY
              valueFrom: {secretKeyRef: {name: healthchecks-ping-key, key: ping-key}}
            - name: NTFY_USERNAME
              valueFrom: {secretKeyRef: {name: ntfy-publisher, key: username}}
            - name: NTFY_PASSWORD
              valueFrom: {secretKeyRef: {name: ntfy-publisher, key: password}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - {name: bootstrap, mountPath: /bootstrap, readOnly: true}
            - {name: data, mountPath: /data}
      containers:
        - name: healthchecks
          image: docker.io/healthchecks/healthchecks@sha256:7cdc4e61a775c82d886703c953bfdccbca9db3ab39f6c4583d39662f3947e1a9
          env:
            - {name: SITE_ROOT, value: "https://health.ops.nairdev.com"}
            - {name: ALLOWED_HOSTS, value: "health.ops.nairdev.com"}
            - {name: DB_NAME, value: "/data/hc.sqlite"}
            - {name: DEBUG, value: "False"}
            - {name: UWSGI_PROCESSES, value: "2"}
            - {name: INTEGRATIONS_ALLOW_PRIVATE_IPS, value: "True"}
            - name: SECRET_KEY
              valueFrom: {secretKeyRef: {name: healthchecks-admin, key: secret-key}}
          ports:
            - {name: http, containerPort: 8000}
          startupProbe:
            httpGet:
              path: /
              port: http
              httpHeaders: [{name: Host, value: health.ops.nairdev.com}]
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders: [{name: Host, value: health.ops.nairdev.com}]
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders: [{name: Host, value: health.ops.nairdev.com}]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: bootstrap
          configMap: {name: healthchecks-bootstrap}
        - name: data
          persistentVolumeClaim: {claimName: healthchecks-data}
---
apiVersion: v1
kind: Service
metadata: {name: healthchecks, namespace: core}
spec:
  selector: {app: healthchecks}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: healthchecks, namespace: core}
spec:
  ingressClassName: traefik
  tls:
    - hosts: [health.ops.nairdev.com]
      secretName: health-ops-nairdev-tls
  rules:
    - host: health.ops.nairdev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: {name: healthchecks, port: {name: http}}
